- name: Criar script de verificaÃ§Ã£o contÃ­nuo
      win_copy:
        content: |
          # Script de verificaÃ§Ã£o contÃ­nuo
          $logFile = "C:\ansible-status.log"
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          
          Add-Content -Path $logFile -Value "$timestamp - VerificaÃ§Ã£o Ansible IIS" -Force
          Add-Content -Path $logFile -Value "========================================" -Force
          
          # Verificar status do IIS
          $iisStatus = Get-Service W3SVC | Select-Object Status, Name
          Add-Content -Path $logFile -Value "IIS Status: $iisStatus" -Force
          
          # Verificar WinRM
          try {
              $winrmTest = Test-WSMan -ComputerName localhost -Port 5985 -Http -Authentication Basic -Credential (New-Object System.Management.Automation.PSCredential("vagrant", "Unylea@2024!DevOps"))
              Add-Content -Path $logFile -Value "WinRM Status: Conectado" -Force
          } catch {
              Add-Content -Path $logFile -Value "WinRM Status: Erro de conexÃ£o" -Force
          }
          
          # Verificar site
          try {
              $siteTest = Invoke-WebRequest -Uri "http://localhost" -UseBasicParsing $true
              Add-Content -Path $logFile -Value "Site Status: $($siteTest.StatusCode)" -Force
          } catch {
              Add-Content -Path $logFile -Value "Site Status: Erro de conexÃ£o" -Force
          }
          
          Add-Content -Path $logFile -Value "========================================" -Force
          Add-Content -Path $logFile -Value "PrÃ³xima verificaÃ§Ã£o em 5 minutos..." -Force
        dest: C:\check-ansible-continuous.ps1

- name: Agendar verificaÃ§Ã£o contÃ­nua
      win_scheduled_task:
        name: "Ansible-IIS-Check"
        description: "VerificaÃ§Ã£o contÃ­nua do servidor IIS via Ansible"
        command: powershell -ExecutionPolicy Bypass -File C:\check-ansible-continuous.ps1
        trigger_type: time
        start_when: S-00:00
        repetition_type: daily
        enabled: yes
        state: present
