---
# Playbook Ansible para Vagrant + Windows Server 2019
# Instala e configura IIS no Windows Server local

- name: Verificar conexÃ£o com Windows Server
  hosts: windows
  gather_facts: no
  tasks:
    - name: Testar conexÃ£o WinRM
      win_ping:
      register: ping_result
      failed_when: ping_result.failed

- name: Exibir informaÃ§Ãµes do sistema
      debug:
        msg: "Sistema operacional: {{ ansible_os_family }} {{ ansible_distribution }} {{ ansible_version }}"

- name: Verificar status do IIS
      win_service_info:
        name: W3SVC
      register: iis_status

- name: Garantir que IIS estÃ¡ instalado
      win_feature:
        name: Web-Server
        state: present
        include_management_tools: yes
      register: iis_install

- name: Iniciar serviÃ§o W3SVC
      win_service:
        name: W3SVC
        state: started
        register: iis_start

- name: Configurar firewall para HTTP
      win_firewall_rule:
        name: HTTP
        enable: yes
        state: present
        localport: 80
        action: Allow
        direction: Inbound
        protocol: TCP

- name: Configurar firewall para HTTPS
      win_firewall_rule:
        name: HTTPS
        enable: yes
        state: present
        localport: 443
        action: Allow
        direction: Inbound
        protocol: TCP

