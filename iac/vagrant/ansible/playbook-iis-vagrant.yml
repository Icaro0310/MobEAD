- name: Verificar acesso ao site
      uri:
        url: http://localhost
        method: GET
      register: website_check
      failed_when: website_check.status != 200

- name: Exibir informaÃ§Ãµes finais
      debug:
        msg: "=== SERVIDOR CONFIGURADO COM SUCESSO ==="
      debug:
        msg: "ðŸŒ Acesse: http://localhost:8080"
      debug:
        msg: "ðŸ–¥ï¸ RDP: mstsc /v:localhost:3389"
      debug:
        msg: "ðŸ”§ WinRM: http://localhost:5985"
      debug:
        msg: "ðŸ“‹ Playbook executado: {{ ansible_playbook_python }}"
      debug:
