# Windows Server + IIS + Ansible Simulado

version: '3.8'

services:
  # Container Windows Server Simulado
  windows-server:
    image: mcr.microsoft.com/windows/servercore/iis:windowsservercore-ltsc2019
    container_name: vm-unylea-winserver-2019
    ports:
      - "8080:80"
      - "3389:3389"
      - "5985:5985"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - ./html:/inetpub/wwwroot
    restart: unless-stopped
    command: >
      powershell -Command "
        Write-Host '=== INICIANDO SERVIDOR IIS ===';
        Start-Service W3SVC -Force;
        Set-Service W3SVC -StartupType Automatic;
        Write-Host 'âœ… IIS iniciado em http://localhost:8080';
        Write-Host 'ðŸ–¥ï¸ RDP disponÃ­vel em localhost:3389';
        Write-Host 'ðŸ”§ WinRM disponÃ­vel em localhost:5985';
        while ($true) { Start-Sleep 3600; }
      "

  # Container Ansible Controller
  ansible-controller:
    image: python:3.9-slim
    container_name: ansible-unylea-controller
    ports:
      - "2222:22"
    volumes:
      - ./ansible:/ansible
      - ./html:/html
    command: >
      bash -c "
        apt-get update && apt-get install -y openssh-server ansible python3-pip;
        pip install pywinrm;
        service ssh start;
        echo 'root:unylea2024' | chpasswd;
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config;
        service ssh restart;
        echo 'âœ… Ansible Controller pronto';
        echo 'ðŸ”§ Acesse: ssh root@localhost -p 2222';
        tail -f /dev/null;
      "

  # Container Nginx Proxy
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-unylea-proxy
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/share/nginx/html
    depends_on:
      - windows-server
    restart: unless-stopped

networks:
  default:
    driver: bridge
