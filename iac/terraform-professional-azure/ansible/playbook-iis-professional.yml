# Playbook Ansible para Azure Professional
# ConfiguraГѓВ§ГѓВЈo completa do Windows Server 2019 + IIS

- name: Verificar conexГѓВЈo com Windows Server Azure
  hosts: windows
  gather_facts: no
  tasks:
    - name: Testar conexГѓВЈo WinRM
      win_ping:
      register: ping_result
      failed_when: ping_result.failed

    - name: Exibir status da conexГѓВЈo
      debug:
        msg: "ГўЕ“вЂ¦ Conectado ao Windows Server Azure com sucesso"

- name: Coletar informaГѓВ§ГѓВµes do sistema
  hosts: windows
  gather_facts: yes
  tasks:
    - name: Exibir informaГѓВ§ГѓВµes do sistema
      debug:
        msg: "Sistema: {{ ansible_os_family }} {{ ansible_distribution }} {{ ansible_version }}"

    - name: Exibir recursos do sistema
      debug:
        msg: "CPU: {{ ansible_processor_cores }} cores, RAM: {{ ansible_memtotal_mb }} MB"

- name: Verificar e configurar IIS
  hosts: windows
  tasks:
    - name: Verificar status do IIS
      win_service_info:
        name: W3SVC
      register: iis_status

    - name: Exibir status do IIS
      debug:
        msg: "Status IIS: {{ iis_status.services[0].state }}"

    - name: Garantir que IIS estГѓВЎ instalado
      win_feature:
        name: Web-Server
        state: present
        include_management_tools: yes
      register: iis_install

    - name: Instalar recursos adicionais do IIS
      win_feature:
        name: "{{ item }}"
        state: present
        include_management_tools: yes
      loop:
        - Web-Asp-Net45
        - Web-Net-Ext45
        - Web-ISAPI-Ext
        - Web-ISAPI-Filter
        - Web-Mgmt-Tools
      register: additional_features

    - name: Iniciar serviГѓВ§o W3SVC
      win_service:
        name: W3SVC
        state: started
        start_mode: auto
      register: iis_start

    - name: Configurar firewall para HTTP/HTTPS
      win_firewall_rule:
        name: "{{ item.name }}"
        enable: yes
        state: present
        localport: "{{ item.port }}"
        action: Allow
        direction: Inbound
        protocol: TCP
      loop:
        - { name: "HTTP", port: "80" }
        - { name: "HTTPS", port: "443" }

- name: Configurar WinRM para Ansible
  hosts: windows
  tasks:
    - name: Verificar configuraГѓВ§ГѓВЈo WinRM
      win_command: powershell -Command "Test-WSMan -ComputerName localhost -Port 5985"
      register: winrm_test

    - name: Exibir status WinRM
      debug:
        msg: "WinRM configurado e funcionando"

- name: Criar aplicaГѓВ§ГѓВЈo web profissional
  hosts: windows
  tasks:
    - name: Criar diretГѓВіrio para aplicaГѓВ§ГѓВЈo
      win_file:
        path: C:\inetpub\wwwroot\app
        state: directory

    - name: Criar pГѓВЎgina da aplicaГѓВ§ГѓВЈo
      win_copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>AplicaГѓВ§ГѓВЈo Web - Unylea DevOps</title>
              <style>
                  body { font-family: 'Segoe UI', Arial; text-align: center; margin-top: 50px; background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; min-height: 100vh; }
                  .container { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; backdrop-filter: blur(10px); max-width: 900px; margin: 0 auto; }
                  h1 { font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
                  .ansible { background: rgba(255, 193, 7, 0.3); padding: 20px; border-radius: 10px; margin: 20px 0; }
                  .app { background: rgba(40, 167, 69, 0.3); padding: 20px; border-radius: 10px; margin: 20px 0; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Г°ЕёЕЎв‚¬ AplicaГѓВ§ГѓВЈo Web Configurada via Ansible!</h1>
                  <div class="app">
                      <h2>Г°ЕёвЂњВ¦ AplicaГѓВ§ГѓВЈo Profissional</h2>
                      <p><strong>Status:</strong> Ativa e funcionando</p>
                      <p><strong>Tecnologia:</strong> IIS + ASP.NET</p>
                      <p><strong>Deploy:</strong> Ansible Automation</p>
                  </div>
                  <div class="ansible">
                      <h2>Г°ЕёвЂќВ§ AutomaГѓВ§ГѓВЈo Ansible</h2>
                      <p><strong>Playbook:</strong> ConfiguraГѓВ§ГѓВЈo completa</p>
                      <p><strong>ConexГѓВЈo:</strong> WinRM seguro</p>
                      <p><strong>Resultado:</strong> Servidor pronto para produГѓВ§ГѓВЈo</p>
                  </div>
                  <p><em>Deploy automatizado com sucesso!</em></p>
              </div>
          </body>
          </html>
        dest: C:\inetpub\wwwroot\app\index.html

    - name: Criar arquivo de configuraГѓВ§ГѓВЈo web.config
      win_copy:
        content: |
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <httpProtocol>
                <customHeaders>
                  <add name="X-Powered-By" value="Unylea-DevOps-Ansible" />
                </customHeaders>
              </httpProtocol>
              <defaultDocument>
                <files>
                  <clear />
                  <add value="index.html" />
                </files>
              </defaultDocument>
            </system.webServer>
            <appSettings>
              <add key="ApplicationName" value="Unylea DevOps App" />
              <add key="Version" value="1.0.0" />
              <add key="DeployedBy" value="Ansible" />
            </appSettings>
          </configuration>
        dest: C:\inetpub\wwwroot\app\web.config

- name: Configurar monitoramento e logging
  hosts: windows
  tasks:
    - name: Criar script de monitoramento
      win_copy:
        content: |
          # Script de monitoramento do servidor
          $logFile = "C:\ansible-monitoring.log"
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          
          Add-Content -Path $logFile -Value "$timestamp - Monitoramento Ansible" -Force
          Add-Content -Path $logFile -Value "========================================" -Force
          
          # Verificar IIS
          $iisStatus = Get-Service W3SVC | Select-Object Status, Name
          Add-Content -Path $logFile -Value "IIS Status: $iisStatus" -Force
          
          # Verificar aplicaГѓВ§ГѓВЈo
          try {
              $appTest = Invoke-WebRequest -Uri "http://localhost/app" -UseBasicParsing $true
              Add-Content -Path $logFile -Value "App Status: $($appTest.StatusCode)" -Force
          } catch {
              Add-Content -Path $logFile -Value "App Status: Erro de conexГѓВЈo" -Force
          }
          
          # Verificar recursos
          $cpuUsage = Get-WmiObject -Class win32_processor | Measure-Object -Property LoadPercentage -Average | Select-Object -ExpandProperty Average
          $memUsage = [math]::Round((Get-WmiObject -Class win32_operatingsystem | ForEach-Object {($_.TotalVisibleMemorySize - $_.FreePhysicalMemory) * 100 / $_.TotalVisibleMemorySize}), 2)
          
          Add-Content -Path $logFile -Value "CPU Usage: $cpuUsage%" -Force
          Add-Content -Path $logFile -Value "Memory Usage: $memUsage%" -Force
          
          Add-Content -Path $logFile -Value "========================================" -Force
        dest: C:\monitor-ansible.ps1

    - name: Agendar monitoramento
      win_scheduled_task:
        name: "Ansible-Monitoring"
        description: "Monitoramento contГѓВ­nuo do servidor IIS"
        command: powershell -ExecutionPolicy Bypass -File C:\monitor-ansible.ps1
        trigger_type: time
        start_when: S-00:00
        repetition_type: daily
        enabled: yes
        state: present

- name: Verificar acesso e funcionalidade
  hosts: windows
  tasks:
    - name: Testar acesso ao site principal
      uri:
        url: http://localhost
        method: GET
      register: main_site_test
      failed_when: main_site_test.status != 200

    - name: Testar acesso ГѓВ  aplicaГѓВ§ГѓВЈo
      uri:
        url: http://localhost/app
        method: GET
      register: app_site_test
      failed_when: app_site_test.status != 200

    - name: Exibir resultados finais
      debug:
        msg: |
          Г°ЕёЕЅвЂ° SERVIDOR CONFIGURADO COM SUCESSO!
          
          Г°ЕёЕ’Вђ URLs de Acesso:
          - Site Principal: http://{{ ansible_host }}
          - AplicaГѓВ§ГѓВЈo: http://{{ ansible_host }}/app
          - Status: http://{{ ansible_host }}/status.html
          
          Г°ЕёвЂ“ВҐГЇВёВЏ Acesso Remoto:
          - RDP: mstsc /v:{{ ansible_host }}:3389
          - WinRM: http://{{ ansible_host }}:5985
          
          Г°ЕёвЂњЕ  Recursos:
          - VM: Standard_B2s (2 vCPUs, 4GB RAM)
          - Storage: Premium SSD 127GB
          - Network: 10Gbps
          
          Г°ЕёвЂќВ§ AutomaГѓВ§ГѓВЈo:
          - Ansible: Configurado e funcionando
          - Playbook: Executado com sucesso
          - Monitoramento: Agendado
          
          Г°ЕёвЂ™В° Custos:
          - Estimativa mensal: ~$50 USD
          - OrГѓВ§amento disponГѓВ­vel: $200 USD
          - Saldo restante: ~$150 USD
          
          ГўЕ“вЂ¦ Status: Servidor profissional pronto para produГѓВ§ГѓВЈo!

- name: Criar script de backup
  hosts: windows
  tasks:
    - name: Criar script de backup automatizado
      win_copy:
        content: |
          # Script de backup do servidor
          $backupPath = "C:\backup"
          $timestamp = Get-Date -Format "yyyy-MM-dd-HH-mm-ss"
          $backupFile = "$backupPath\iis-backup-$timestamp.zip"
          
          # Criar diretГѓВіrio de backup
          if (!(Test-Path $backupPath)) {
              New-Item -ItemType Directory -Path $backupPath -Force
          }
          
          # Fazer backup do site
          Compress-Archive -Path "C:\inetpub\wwwroot" -DestinationPath $backupFile -Force
          
          Write-Host "Backup concluГѓВ­do: $backupFile"
          
          # Limpar backups antigos (manter ГѓВєltimos 7)
          Get-ChildItem $backupPath -Filter "*.zip" | Sort-Object CreationTime -Descending | Select-Object -Skip 7 | Remove-Item -Force
        dest: C:\backup-iis.ps1

    - name: Agendar backup diГѓВЎrio
      win_scheduled_task:
        name: "IIS-Daily-Backup"
        description: "Backup diГѓВЎrio do servidor IIS"
        command: powershell -ExecutionPolicy Bypass -File C:\backup-iis.ps1
        trigger_type: daily
        start_when: S-02:00
        enabled: yes
        state: present
