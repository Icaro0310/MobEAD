п»ї# Docker Compose para SimulaГѓВ§ГѓВЈo Windows Server + IIS
# SoluГѓВ§ГѓВЈo rГѓВЎpida e leve para projeto acadГѓВЄmico

version: '3.8'

services:
  # Container Windows Server com IIS (via Wine)
  windows-server:
    image: mcr.microsoft.com/windows/servercore/iis:windowsservercore-ltsc2019
    container_name: vm-unylea-winserver-2019
    ports:
      - "8080:80"
      - "443:443"
      - "5985:5985"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - ./html:/inetpub/wwwroot
      - ./scripts:/scripts
    networks:
      - unylea-network
    restart: unless-stopped
    command: >
      powershell -Command "
        Write-Host '=== Inicializando Servidor IIS ===';
        Start-Service W3SVC;
        Set-Service W3SVC -StartupType Automatic;
        Write-Host 'ГўЕ“вЂ¦ IIS iniciado com sucesso';
        Write-Host 'Г°ЕёЕ’Вђ Servidor disponГѓВ­vel em: http://localhost:8080';
        while ($true) { Start-Sleep 3600; }
      "

  # Container Ansible (para simulaГѓВ§ГѓВЈo)
  ansible-controller:
    image: python:3.9-slim
    container_name: ansible-unylea-controller
    ports:
      - "2222:22"
    volumes:
      - ./ansible:/ansible
      - ./scripts:/scripts
    networks:
      - unylea-network
    command: >
      bash -c "
        apt-get update && apt-get install -y openssh-server ansible python3-pip;
        pip install pywinrm;
        service ssh start;
        echo 'root:unylea2024' | chpasswd;
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config;
        service ssh restart;
        echo 'ГўЕ“вЂ¦ Ansible Controller pronto';
        echo 'Г°ЕёвЂќВ§ Acesse: ssh root@localhost -p 2222 (senha: unylea2024)';
        tail -f /dev/null;
      "

  # Container Terraform (para simulaГѓВ§ГѓВЈo)
  terraform-controller:
    image: hashicorp/terraform:latest
    container_name: terraform-unylea-controller
    volumes:
      - ./terraform:/terraform
      - ./scripts:/scripts
    networks:
      - unylea-network
    command: >
      sh -c "
        echo '=== Terraform Controller ===';
        echo 'Г°ЕёвЂњВ¦ Terraform instalado: $(terraform version)';
        echo 'Г°ЕёвЂќВ§ DiretГѓВіrio de trabalho: /terraform';
        echo 'Г°ЕёЕ’Вђ Rede: unylea-network';
        echo 'ГўЕ“вЂ¦ Terraform pronto para uso';
        tail -f /dev/null;
      "

  # Container Nginx (proxy reverso)
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-unylea-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./html:/usr/share/nginx/html
    networks:
      - unylea-network
    depends_on:
      - windows-server
    restart: unless-stopped

networks:
  unylea-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  html:
  scripts:
  ansible:
  terraform:
